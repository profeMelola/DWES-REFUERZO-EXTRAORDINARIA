<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios — CineApp</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --brand: #1a1a2e; --brand-mid: #16213e; --accent: #e94560;
            --bg: #f5f5f0; --surface: #ffffff; --border: #e2e2da;
            --text: #1a1a2e; --text-muted: #6b6b80; --radius: 6px;
            --shadow: 0 1px 3px rgba(0,0,0,.08);
        }
        body { font-family: 'Georgia', serif; font-size: 15px; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        nav { background: var(--brand); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 56px; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-size: 1.2rem; font-weight: bold; color: #fff; text-decoration: none; }
        .nav-brand span { color: #e94560; }
        .nav-links { display: flex; align-items: center; gap: 4px; list-style: none; }
        .nav-links a { color: rgba(255,255,255,.8); text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 14px; }
        .nav-links a.active, .nav-links a:hover { background: rgba(255,255,255,.1); color: #fff; }
        .nav-badge { font-size: 10px; background: #e94560; color: #fff; padding: 1px 6px; border-radius: 20px; margin-left: 4px; }
        .nav-user { display: flex; align-items: center; gap: 12px; font-size: 13px; color: rgba(255,255,255,.7); }
        .nav-user strong { color: #fff; }
        .btn-logout { background: rgba(233,69,96,.25); color: #e94560; border: 1px solid rgba(233,69,96,.4); padding: 5px 14px; border-radius: 6px; font-size: 13px; text-decoration: none; }
        main { flex: 1; max-width: 1000px; width: 100%; margin: 0 auto; padding: 2rem 1.5rem; }
        .page-header { margin-bottom: 1.75rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; justify-content: space-between; }
        .page-header h1 { font-size: 1.6rem; font-weight: normal; color: var(--brand); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.5rem; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: var(--brand); color: rgba(255,255,255,.9); font-weight: normal; font-size: 12px; text-transform: uppercase; letter-spacing: .6px; padding: 10px 14px; text-align: left; }
        td { padding: 11px 14px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafaf7; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge-active { background: #e6f4ea; color: #1e7e34; }
        .badge-inactive { background: #fdecea; color: #c62828; }
        .badge-admin { background: #fff3e0; color: #e65100; }
        .badge-user { background: #e8eaf6; color: #283593; }
        .btn { display: inline-block; padding: 7px 18px; border-radius: var(--radius); font-size: 13px; text-decoration: none; cursor: pointer; border: none; transition: opacity .15s; }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-accent:hover { opacity: .88; }
        .btn-danger { background: #fdecea; color: #c62828; border: 1px solid #f5c6cb; }
        .btn-danger:hover { background: #f5c6cb; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        footer { background: var(--brand); color: rgba(255,255,255,.4); text-align: center; font-size: 12px; padding: 14px; }

        /* ── Específico de esta vista ── */
        .col-id     { width: 60px; }
        .col-user   { }
        .col-role   { width: 110px; }
        .col-active { width: 100px; }
        .col-action { width: 100px; text-align: right; }

        /* Fila del usuario actual (no se puede borrar) */
        .row-current-user td { background: #fafff8; }
        .row-current-user .btn-danger { opacity: .35; pointer-events: none; cursor: default; }
    </style>
</head>
<body>

<nav>
    <a href="/movies" class="nav-brand">&#9654; Cine<span>App</span></a>
    <ul class="nav-links">
        <li><a href="/movies">Películas</a></li>
        <li><a href="/admin/users" class="active">Admin <span class="nav-badge">ADMIN</span></a></li>
    </ul>
    <div class="nav-user">
        Hola, <strong>admin</strong>
        <a href="/logout" class="btn-logout">Salir</a>
    </div>
</nav>

<main>
    <div class="page-header">
        <h1>Gestión de Usuarios</h1>
        <!-- th:href="@{/admin/users/new}" -->
        <a href="/admin/users/new" class="btn btn-accent">+ Nuevo usuario</a>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th class="col-id">ID</th>
                    <th class="col-user">Username</th>
                    <th class="col-role">Rol</th>
                    <th class="col-active">Activo</th>
                    <th class="col-action"></th>
                </tr>
            </thead>
            <tbody>
                <!-- USUARIO ACTUAL — el botón de borrado está deshabilitado -->
                <!-- En Thymeleaf: th:classappend="${user.username == #authentication.name} ? 'row-current-user'" -->
                <tr class="row-current-user">
                    <!-- th:text="${user.id}" -->
                    <td>1</td>
                    <!-- th:text="${user.username}" -->
                    <td><strong>admin</strong> <span style="font-size:11px;color:#888">(tú)</span></td>
                    <!-- th:text="${user.role}" con th:classappend para el badge -->
                    <td><span class="badge badge-admin">ADMIN</span></td>
                    <!-- th:text="${user.active} ? 'Sí' : 'No'" -->
                    <td><span class="badge badge-active">Sí</span></td>
                    <td style="text-align:right">
                        <!-- Formulario POST para borrar — en Thymeleaf: th:action="@{/admin/users/{id}/delete(id=${user.id})}" -->
                        <form action="/admin/users/1/delete" method="post" style="display:inline">
                            <input type="hidden" name="_csrf" value="TOKEN_CSRF">
                            <button type="submit" class="btn btn-danger btn-sm">Borrar</button>
                        </form>
                    </td>
                </tr>

                <!-- USUARIO NORMAL -->
                <tr>
                    <td>2</td>
                    <td>usuario1</td>
                    <td><span class="badge badge-user">USER</span></td>
                    <td><span class="badge badge-active">Sí</span></td>
                    <td style="text-align:right">
                        <form action="/admin/users/2/delete" method="post" style="display:inline">
                            <input type="hidden" name="_csrf" value="TOKEN_CSRF">
                            <button type="submit" class="btn btn-danger btn-sm">Borrar</button>
                        </form>
                    </td>
                </tr>

                <!-- USUARIO INACTIVO -->
                <tr>
                    <td>3</td>
                    <td>usuario2</td>
                    <td><span class="badge badge-user">USER</span></td>
                    <td><span class="badge badge-inactive">No</span></td>
                    <td style="text-align:right">
                        <form action="/admin/users/3/delete" method="post" style="display:inline">
                            <input type="hidden" name="_csrf" value="TOKEN_CSRF">
                            <button type="submit" class="btn btn-danger btn-sm">Borrar</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<footer>
    CineApp &mdash; Trabajo práctico Spring Boot MVC &middot; 2025
</footer>

</body>
</html>
