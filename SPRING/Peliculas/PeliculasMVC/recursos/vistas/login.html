<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — CineApp</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --brand: #1a1a2e; --accent: #e94560;
            --bg: #f5f5f0; --surface: #ffffff; --border: #e2e2da;
            --text: #1a1a2e; --text-muted: #6b6b80; --radius: 6px;
        }
        body {
            font-family: 'Georgia', serif;
            font-size: 15px;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Cabecera mínima en login (sin links de nav) */
        header {
            background: var(--brand);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 56px;
        }

        .nav-brand { font-size: 1.2rem; font-weight: bold; color: #fff; text-decoration: none; }
        .nav-brand span { color: var(--accent); }

        /* Contenedor centrado */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
            padding: 2.5rem 2.25rem;
            width: 100%;
            max-width: 380px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 1.75rem;
        }

        .login-logo .icon {
            width: 48px;
            height: 48px;
            background: var(--brand);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 22px;
            margin-bottom: 12px;
        }

        .login-logo h1 {
            font-size: 1.4rem;
            font-weight: normal;
            color: var(--brand);
        }

        .login-logo p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .form-group { margin-bottom: 1.1rem; }

        label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 5px; }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            font-family: inherit;
            color: var(--text);
            background: var(--surface);
            outline: none;
            transition: border-color .15s;
        }

        input:focus { border-color: var(--brand); }

        /* Alerta de error (th:if="${param.error}") */
        .alert-error {
            background: #fdecea;
            color: #c62828;
            border-left: 3px solid #c62828;
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 13px;
            margin-bottom: 1.25rem;
        }

        .btn-login {
            width: 100%;
            padding: 11px;
            background: var(--brand);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            margin-top: .5rem;
            transition: background .15s;
        }

        .btn-login:hover { background: #16213e; }

        footer {
            background: var(--brand);
            color: rgba(255,255,255,.4);
            text-align: center;
            font-size: 12px;
            padding: 14px;
        }
    </style>
</head>
<body>

<header>
    <a href="/" class="nav-brand">&#9654; Cine<span>App</span></a>
</header>

<div class="login-wrapper">
    <div class="login-card">

        <div class="login-logo">
            <div class="icon">&#9654;</div>
            <h1>Bienvenido</h1>
            <p>Inicia sesión para continuar</p>
        </div>

        <!-- Alerta de error — en Thymeleaf: th:if="${param.error}" -->
        <!-- Se muestra cuando Spring Security redirige a /login?error -->
        <div class="alert-error">
            Usuario o contraseña incorrectos.
        </div>

        <!--
            FORM:
            action="/login"  →  en Thymeleaf: th:action="@{/login}"
            method="post"    →  obligatorio para Spring Security
        -->
        <form action="/login" method="post">

            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username"
                       placeholder="Tu nombre de usuario" autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password"
                       placeholder="••••••••" autocomplete="current-password">
            </div>

            <!--
                CAMPO CSRF — imprescindible en formularios POST con Spring Security.
                En Thymeleaf se añade automáticamente si usas th:action,
                o manualmente con:
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            -->
            <input type="hidden" name="_csrf" value="TOKEN_CSRF_AQUI">

            <button type="submit" class="btn-login">Entrar</button>
        </form>
    </div>
</div>

<footer>
    CineApp &mdash; Trabajo práctico Spring Boot MVC &middot; 2025
</footer>

</body>
</html>
