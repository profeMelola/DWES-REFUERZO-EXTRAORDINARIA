<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Películas — CineApp</title>
    <!-- En la versión Thymeleaf esto será: th:replace="~{fragments/layout :: head}" -->
    <link rel="stylesheet" href="../fragments/layout.html">

    <style>
        /* ── Estilos incluidos desde layout.html en la versión final ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --brand: #1a1a2e; --brand-mid: #16213e; --accent: #e94560;
            --bg: #f5f5f0; --surface: #ffffff; --border: #e2e2da;
            --text: #1a1a2e; --text-muted: #6b6b80; --radius: 6px;
            --shadow: 0 1px 3px rgba(0,0,0,.08);
        }
        body { font-family: 'Georgia', serif; font-size: 15px; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        nav { background: var(--brand); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 56px; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-size: 1.2rem; font-weight: bold; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .nav-brand span { color: #e94560; }
        .nav-links { display: flex; align-items: center; gap: 4px; list-style: none; }
        .nav-links a { color: rgba(255,255,255,.8); text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 14px; }
        .nav-links a:hover, .nav-links a.active { background: rgba(255,255,255,.1); color: #fff; }
        .nav-badge { font-size: 10px; background: #e94560; color: #fff; padding: 1px 6px; border-radius: 20px; margin-left: 4px; }
        .nav-user { display: flex; align-items: center; gap: 12px; font-size: 13px; color: rgba(255,255,255,.7); }
        .nav-user strong { color: #fff; }
        .btn-logout { background: rgba(233,69,96,.25); color: #e94560; border: 1px solid rgba(233,69,96,.4); padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; text-decoration: none; }
        main { flex: 1; max-width: 1000px; width: 100%; margin: 0 auto; padding: 2rem 1.5rem; }
        .page-header { margin-bottom: 1.75rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; justify-content: space-between; }
        .page-header h1 { font-size: 1.6rem; font-weight: normal; color: var(--brand); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.5rem; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: var(--brand); color: rgba(255,255,255,.9); font-weight: normal; font-size: 12px; text-transform: uppercase; letter-spacing: .6px; padding: 10px 14px; text-align: left; }
        td { padding: 11px 14px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafaf7; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; letter-spacing: .3px; }
        .badge-active { background: #e6f4ea; color: #1e7e34; }
        .badge-inactive { background: #fdecea; color: #c62828; }
        .badge-genre { background: #f3e5f5; color: #6a1b9a; }
        .btn { display: inline-block; padding: 7px 18px; border-radius: var(--radius); font-size: 13px; text-decoration: none; cursor: pointer; border: none; }
        .btn-primary { background: var(--brand); color: #fff; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        .row-inactive td { opacity: .6; }
        footer { background: var(--brand); color: rgba(255,255,255,.4); text-align: center; font-size: 12px; padding: 14px; }

        /* ── Específico de esta vista ── */
        .film-title { font-weight: bold; color: var(--brand); }
        .col-id    { width: 60px; }
        .col-year  { width: 80px; }
        .col-genre { width: 120px; }
        .col-state { width: 100px; }
        .col-action{ width: 80px; text-align: right; }
    </style>
</head>
<body>

<!-- NAV (en la versión Thymeleaf: th:replace="~{fragments/layout :: nav}") -->
<nav>
    <a href="/movies" class="nav-brand">&#9654; Cine<span>App</span></a>
    <ul class="nav-links">
        <li><a href="/movies" class="active">Películas</a></li>
        <li><a href="/admin/users">Admin <span class="nav-badge">ADMIN</span></a></li>
    </ul>
    <div class="nav-user">
        Hola, <strong>admin</strong>
        <a href="/logout" class="btn-logout">Salir</a>
    </div>
</nav>

<main>
    <div class="page-header">
        <h1>Catálogo de Películas</h1>
        <!-- Contador de resultados: en Thymeleaf se calculará dinámicamente -->
        <span style="font-size:13px; color: var(--text-muted);">3 películas</span>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th class="col-id">ID</th>
                    <th>Título</th>
                    <th class="col-year">Año</th>
                    <th class="col-genre">Género</th>
                    <th class="col-state">Estado</th>
                    <th class="col-action"></th>
                </tr>
            </thead>
            <tbody>
                <!-- FILA ACTIVA — ejemplo normal -->
                <tr>
                    <td>1</td>
                    <td class="film-title">Inception</td>
                    <td>2010</td>
                    <td><span class="badge badge-genre">SCI_FI</span></td>
                    <td><span class="badge badge-active">Activa</span></td>
                    <td style="text-align:right">
                        <a href="/movies/1" class="btn btn-primary btn-sm">Ver</a>
                    </td>
                </tr>
                <!-- FILA ACTIVA -->
                <tr>
                    <td>2</td>
                    <td class="film-title">The Godfather</td>
                    <td>1972</td>
                    <td><span class="badge badge-genre">DRAMA</span></td>
                    <td><span class="badge badge-active">Activa</span></td>
                    <td style="text-align:right">
                        <a href="/movies/2" class="btn btn-primary btn-sm">Ver</a>
                    </td>
                </tr>
                <!-- FILA INACTIVA — en Thymeleaf llevará th:classappend="'row-inactive'" -->
                <tr class="row-inactive">
                    <td>3</td>
                    <td class="film-title">Interstellar</td>
                    <td>2014</td>
                    <td><span class="badge badge-genre">SCI_FI</span></td>
                    <td><span class="badge badge-inactive">Inactiva</span></td>
                    <td style="text-align:right">
                        <a href="/movies/3" class="btn btn-primary btn-sm">Ver</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Mensaje si no hay películas: en Thymeleaf estará dentro de th:if -->
    <!--
    <div class="card" style="text-align:center; padding: 3rem; color: var(--text-muted);">
        No se encontraron películas.
    </div>
    -->
</main>

<footer>
    CineApp &mdash; Trabajo práctico Spring Boot MVC &middot; 2025
</footer>

</body>
</html>
